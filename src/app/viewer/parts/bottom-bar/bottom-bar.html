<!-- Vista previa flotante sobre el thumb -->
<div 
#preview
class="absolute z-40 transition-opacity duration-200 pointer-events-auto"
    [ngStyle]="{ left: previewContainerStyle.left + 'px', top: previewContainerStyle.top + 'px'}" *ngIf="isDragging">
    <div
    class="bg-black/40 backdrop-blur text-white rounded-2xl shadow-xl pt-2 pr-2 pl-2 pb-0 flex flex-col items-center">

        <div class="flex gap-1 justify-center">
            <img *ngIf="previewImages.length === 1" [src]="previewImages[0]"
                class="rounded-xl object-contain"
                [ngStyle]="{ width: previewImageStyle.width + 'px', height: previewImageStyle.height + 'px' }" />
            <ng-container *ngIf="previewImages.length === 2">
                <img [src]="previewImages[0]" class="rounded-md object-contain" 
                [ngStyle]="{ width: previewImageStyle.width + 'px', height: previewImageStyle.height + 'px' }"/>
                <img [src]="previewImages[1]" class="rounded-md object-contain"
                [ngStyle]="{ width: previewImageStyle.width + 'px', height: previewImageStyle.height + 'px' }"/>
            </ng-container>
        </div>
        <div class="flex items-center justify-center py-1">
            <div class="text-xs font-medium text-center">
            {{ previewLabel }}
            </div>
          </div>
    </div>
</div>



<!-- Contenedor inferior -->
<div #buttomBar class="bottom-bar  z-40 pointer-events-auto 
    w-[85vw] sm:w-[85vw] md:w-[80vw] lg:w-[70vw] xl:w-[65vw] min-w-[200px]" [class.visible]="visible">
    <div class="w-full bg-black/40 backdrop-blur text-white rounded-full shadow-lg space-y-3 
    px-6 sm:px-8 md:px-9
    py-2">

        <!-- Slider de páginas (funcional como slider) -->
        <input #pageSlider type="range" min="1" [max]="totalPages" [step]="sliderStep" [(ngModel)]="currentPageSlider"
            (mousedown)="onSliderStart()" (touchstart)="onSliderTouchStart($event, pageSlider)" (input)="onSliderMove()"
            (mouseup)="onSliderEnd()" (ngModelChange)="onSliderValueChange($event)"
            class="w-full h-[7px] bg-white/20 rounded-full accent-white cursor-pointer page-slider" />


        <!-- Controles -->
        <div class="flex items-center justify-between w-full h-[24px]">

            <!-- Izquierda: Número de página -->
            <div class="text-sm font-medium text-left" [ngStyle]="{ width: pageTextWidth }">
                {{ pagesText }}
            </div>

            <!-- Centro: Control de Zoom (20% del ancho y centrado) -->
            <div class="hidden sm-450:flex items-center justify-center w-[30%] gap-2">
                <button (click)="zoomOut()" class="text-white hover:text-gray-300">
                    <span class="text-xl leading-none">−</span>
                </button>
                <input type="range" min="0" max="4" step="0.1" [(ngModel)]="zoom"
                    class="w-full h-[7px] accent-white min-w-[120px]" />
                <button (click)="zoomIn()" class="text-white hover:text-gray-300">
                    <span class="text-xl leading-none">+</span>
                </button>
            </div>

            <!-- Derecha: Iconos -->
            <div class="flex gap-4 items-center ">
                <button (click)="downloadPDF()" class="hover:text-gray-300 transition-colors">
                    <lucide-angular [img]="icons.download" class="w-5 h-5"></lucide-angular>
                </button>
                <button (click)="toggleFullscreen()" class="hover:text-gray-300 transition-colors">
                    <lucide-angular
                      [img]="isFullscreen ? icons.minimize : icons.maximize"
                      class="w-5 h-5">
                    </lucide-angular>
                  </button>
            </div>
        </div>
    </div>
</div>
