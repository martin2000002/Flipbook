<div *ngIf="loading$ | async" class="fixed inset-0 flex flex-col items-center justify-center z-50 bg-[#333333]">
    <!-- <img src="assets/gifs/loader-white.gif" class="will-change-transform translate-z-0 w-[20vmin] h-[20vmin] object-contain mb-4" /> -->
    <app-lottie-player [path]="lottieOptions.path" [loop]="lottieOptions.loop" [autoplay]="lottieOptions.autoplay"
        (animationReady)="onLottieReady()"
        class="will-change-transform translate-z-0 w-[21vmin] h-[21vmin] object-contain mb-4">
    </app-lottie-player>
    <div *ngIf="lottieReady" class="text-white text-lg font-semibold tracking-wide font-sans">
        {{ progress$ | async }}%
    </div>
</div>
