<div class="flex flex-col items-center p-4">
  <div id="flipbook" class="shadow-lg overflow-hidden bg-white">
    <div class="hard flex items-center justify-center bg-gray-800 text-white text-xl">PORTADA</div>
    <div class="hard bg-gray-800"></div>

    <div *ngFor="let image of pages" class="page">
      <img [src]="image" />
    </div>

    <div class="hard bg-gray-800"></div>
    <div class="hard flex items-center justify-center bg-gray-900 text-white text-xl">FIN</div>
  </div>

  <div class="mt-4 flex gap-4">
    <button (click)="prev()" class="px-4 py-2 bg-blue-600 text-white rounded">Anterior</button>
    <button (click)="next()" class="px-4 py-2 bg-blue-600 text-white rounded">Siguiente</button>
  </div>
</div>
