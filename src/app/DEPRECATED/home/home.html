<div *ngIf="loading" class="fixed inset-0 flex flex-col items-center justify-center bg-white z-50">
  <img src="assets/gifs/loader-black.gif" class="w-[20vmin] h-[20vmin] object-contain mb-4" />
  <div class="text-black text-lg font-semibold tracking-wide font-sans">
    {{ loadProgress }}%
  </div>
</div>


<div class="fixed inset-0 bg-white">
  <pdf-viewer
  [src]="pdfSrc"
  [render-text]="true"
  style="display: block; width: 100%; height: 100vh;"
  [original-size]="false"
  [zoom]="1.0"
  (after-load-complete)="onPdfLoadComplete()"
  (on-progress)="onProgress($event)"
></pdf-viewer>
</div>
